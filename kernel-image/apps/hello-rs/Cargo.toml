[package]
name = "hello-rs"
version = "0.1.0"
edition = "2021"
description = "A Rust CIBOS application (.capp) built on cibos-app — proves the no_std app runtime runs in ring 3"

[[bin]]
name = "hello-rs"
path = "src/main.rs"

[dependencies]
cibos-app = { path = "../../../cibos-app" }

[profile.release]
panic = "abort"
opt-level = "z"
lto = false

[profile.dev]
panic = "abort"

[workspace]
# Standalone: not part of the main workspace (it is a freestanding no_main
# binary built only for the bare app target by kernel-image's build script).
