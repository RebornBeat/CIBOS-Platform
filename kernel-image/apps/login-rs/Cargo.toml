[package]
name = "login-rs"
version = "0.1.0"
edition = "2021"
description = "CIBOS login application (.capp): create-user / login flow on the cibos-app runtime, persisting credentials in CIBOSFS"

[[bin]]
name = "login-rs"
path = "src/main.rs"

[dependencies]
cibos-app = { path = "../../../cibos-app" }
shared = { path = "../../../shared", default-features = false }
# The REAL login gate + account registry, no_std builds. The login flow and
# credential verification are the shared implementations — not reimplemented.
login = { path = "../../../login", default-features = false }
accounts = { path = "../../../accounts", default-features = false }
cibos-console = { path = "../../../cibos-console" }

[profile.release]
panic = "abort"
opt-level = "z"
lto = false

[profile.dev]
panic = "abort"

[workspace]
# Standalone: built only for the bare app target by kernel-image's build script.
