[package]
name = "mkbootimage"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Host tool that assembles a directly-bootable CIBOS disk image (Stage 1 + Stage 2 + CIBIOS + CIBOS) with no GRUB or multiboot"

[[bin]]
name = "mkbootimage"
path = "src/main.rs"

[dependencies]
shared = { workspace = true, features = ["std"] }
